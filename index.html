  --green1: #2d6a4a;

  --green-light: #d8e8d8;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--cream);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:480px;margin:0 auto;position:relative}

/* Screen */
.screen{display:none;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);padding-bottom:40px}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Nav */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(245,241,232,.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.05);}
.nav .back{width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.1);background:transparent;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
.nav .back:active{transform:scale(.9)}
.nav .ttl{font-size:15px;font-weight:600;letter-spacing:.5px}

/* Section */
.section{display:flex;align-items:center;justify-content:space-between;padding:32px 20px 14px;}
.section h3{font-size:18px;font-weight:700;letter-spacing:1px}
.section .tag{font-size:11px;color:var(--text3);font-weight:400;letter-spacing:1px;text-transform:uppercase}
